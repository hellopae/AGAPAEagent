<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGAPAE AI Studio — Team Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Refined, formal identity — slate navy with a muted bronze highlight.
       Status & pipeline tones are desaturated for an understated, elegant feel. */
    --paper:#F4F2EE;     /* soft warm ivory */
    --paper-2:#FCFBF8;
    --ink:#1B1C20;       /* near-black */
    --ink-soft:#56565E;
    --ink-faint:#97969C;
    --line:#E5E2DB;
    --line-strong:#D2CEC4;

    --accent:#2A3344;    /* deep slate navy — primary / structural */
    --gold:#9A7B4F;      /* muted bronze — restrained highlight */

    /* status — quiet and professional */
    --working:#3E5366;   /* slate blue */
    --done:#5E7A66;      /* sage green */
    --idle:#9A9AA2;      /* neutral grey */

    /* pipeline tones — harmonious, low-saturation */
    --c-orch:#2A3344;    /* deep slate navy */
    --c-content:#9A7B4F; /* bronze */
    --c-design:#4A6670;  /* muted teal-slate */
    --c-quality:#8A5A66; /* muted burgundy */
    --c-standalone:#8C8A86; /* warm grey */
    --c-news:#3A6B50;      /* forest green — news feed */

    --card:#FFFFFF;
    --shadow:0 1px 2px rgba(27,28,32,.04),0 10px 30px rgba(27,28,32,.07);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Space Grotesk","Noto Sans Thai",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:0 0 64px;
  }
  .mono{font-family:"IBM Plex Mono",monospace}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* ---------- header ---------- */
  header{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--paper-2),var(--paper));
    position:sticky;top:0;z-index:20;
    backdrop-filter:saturate(1.1);
  }
  .head-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:18px 0}
  .brand{display:flex;align-items:center;gap:14px}
  .press-mark{
    width:40px;height:40px;border-radius:9px;flex:none;display:block;object-fit:cover;
    background:var(--paper);border:1px solid var(--line-strong);
  }
  .brand h1{font-size:17px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
  .brand .sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
  .live{display:flex;align-items:center;gap:18px}
  .stat{text-align:right}
  .stat .n{font-size:20px;font-weight:600;line-height:1}
  .stat .l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
  .stat .n.work{color:var(--working)}

  /* ---------- hero strip ---------- */
  .hero{padding:40px 0 24px}
  .hero .ey{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;font-weight:500}
  .hero p{color:var(--ink);font-size:clamp(20px,2.4vw,26px);font-weight:500;letter-spacing:-.01em}

  /* ---------- filter ---------- */
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0 26px;border-bottom:1px solid var(--line);margin-bottom:30px}
  .filters .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-right:6px}
  .chip{
    font-family:"IBM Plex Mono",monospace;font-size:12px;
    padding:7px 13px;border-radius:999px;border:1px solid var(--line-strong);
    background:transparent;color:var(--ink-soft);cursor:pointer;transition:.16s;
    display:flex;align-items:center;gap:7px;
  }
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .chip.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}
  .dot{width:7px;height:7px;border-radius:50%;flex:none}

  /* ---------- grid : portrait gallery cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:16px}
  .card{
    position:relative;aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;cursor:pointer;
    border:1px solid var(--line);background:var(--accent);
    box-shadow:0 1px 2px rgba(27,28,32,.05);
    transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;
  }
  .card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  .card .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .card .ph-art{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:68px;color:rgba(255,255,255,.92);text-shadow:0 2px 6px rgba(0,0,0,.25)}
  .card .veil{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(18,20,26,.5) 0%,rgba(18,20,26,.04) 24%,rgba(18,20,26,0) 46%,rgba(18,20,26,.58) 72%,rgba(18,20,26,.92) 100%)}
  .card .topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:13px;gap:8px}
  .card .idx{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.82)}
  .ptag{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#fff;
    padding:5px 10px;border-radius:999px;background:rgba(18,20,26,.36);backdrop-filter:blur(6px);
    display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.14)}
  .ptag .dot{width:6px;height:6px;border-radius:50%;flex:none}
  .card .meta{position:absolute;left:0;right:0;bottom:0;padding:15px 15px 16px;color:#fff}
  .card .meta .name{font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
  .card .meta .role{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:5px}
  .card .statline{display:flex;align-items:center;gap:8px;margin-top:11px}
  .cstat{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.88)}
  .cdot{width:7px;height:7px;border-radius:50%;flex:none}
  .cdot.pulsing{animation:cpulse 1.5s infinite}
  @keyframes cpulse{0%{box-shadow:0 0 0 0 rgba(143,176,200,.6)}70%{box-shadow:0 0 0 6px rgba(143,176,200,0)}100%{box-shadow:0 0 0 0 rgba(143,176,200,0)}}
  .rpt-pill{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.05em;color:#fff;
    cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;
    background:rgba(154,123,79,.82);border:1px solid rgba(255,255,255,.18);transition:.15s}
  .rpt-pill:hover{background:var(--gold)}

  /* ---------- drawer-only support styles ---------- */
  .avatar{
    width:96px;height:96px;border-radius:16px;flex:none;object-fit:cover;
    background:var(--paper);display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:32px;color:#fff;border:1px solid var(--line);letter-spacing:0;
  }
  .avatar.ph{border:none;text-shadow:0 1px 2px rgba(0,0,0,.18)}
  .badge{
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .badge.working{background:rgba(62,83,102,.12);color:var(--working)}
  .badge.idle{background:#EFEDE7;color:var(--ink-faint)}
  .badge.done{background:rgba(94,122,102,.14);color:var(--done)}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--working)}
  .badge.working .pulse{animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(62,83,102,.5)}70%{box-shadow:0 0 0 6px rgba(62,83,102,0)}100%{box-shadow:0 0 0 0 rgba(62,83,102,0)}}
  .caps{display:flex;flex-wrap:wrap;gap:6px}
  .cap{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--paper);border:1px solid var(--line);color:var(--ink-soft)}
  .report.flash{animation:flash 1.1s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 rgba(94,122,102,.5)}100%{box-shadow:0 0 0 10px rgba(94,122,102,0)}}

  /* ---------- drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(23,23,28,.32);opacity:0;pointer-events:none;transition:.22s;z-index:40}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(460px,92vw);background:var(--paper-2);
    border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(23,23,28,.12);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:41;
    display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center}
  .drawer-head .avatar{width:112px;height:112px;font-size:38px}
  .drawer-head .name{font-size:22px;font-weight:600}
  .drawer-head .role{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}
  .close{margin-left:auto;background:none;border:1px solid var(--line-strong);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--ink-soft);flex:none}
  .close:hover{border-color:var(--ink);color:var(--ink)}
  .drawer-body{padding:24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:24px}
  .sec h4{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
  .sec p{font-size:14px;color:var(--ink-soft)}
  .sec.what ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .sec.what li{font-size:13.5px;padding-left:18px;position:relative;color:var(--ink)}
  .sec.what li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .report{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .report .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .report .when{font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--ink-faint)}
  .report h5{font-size:14px;font-weight:600;margin-bottom:8px}
  .report .lines{font-size:13px;color:var(--ink-soft);white-space:pre-line;font-family:"Noto Sans Thai","Space Grotesk",sans-serif}
  .empty{font-size:13px;color:var(--ink-faint);font-style:italic}

  footer{margin-top:46px;padding-top:22px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-faint)}
  footer .mono{color:var(--ink-soft)}

  @media(max-width:560px){
    .head-inner{flex-direction:column;align-items:flex-start;gap:14px}
    .hero{padding:28px 0 16px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<aside class="drawer" id="drawer" aria-hidden="true"></aside>

/* AGENTS = live data. Starts as the seed, gets replaced by status.json when available. */
let AGENTS = SEED_AGENTS;

/* ---------- render filters ---------- */
const filterBox=document.getElementById('filters');
let active="all";
const allChip=mkChip("all","ทั้งหมด",null,true);
filterBox.appendChild(allChip);
Object.entries(PIPELINES).forEach(([k,v])=>filterBox.appendChild(mkChip(k,v.label,v.color)));
function mkChip(key,label,color,on){
  const b=document.createElement('button');
  b.className="chip"+(on?" active":"");
  b.dataset.key=key;
  b.innerHTML=(color?`<span class="dot" style="background:${color}"></span>`:"")+label;
  b.onclick=()=>{active=key;[...filterBox.querySelectorAll('.chip')].forEach(c=>c.classList.toggle('active',c.dataset.key===key));render()};
  return b;
}

/* ---------- render grid ---------- */
const grid=document.getElementById('grid');
function render(){
  grid.innerHTML="";
  const list=AGENTS.filter(a=>active==="all"||a.pipeline===active);
  list.forEach((a,i)=>{
    const p=PIPELINES[a.pipeline];
    const card=document.createElement('div');
    card.className="card";
    card.onclick=()=>openDrawer(a);
    card.innerHTML=`
      ${artHTML(a)}
      <div class="veil"></div>
      <div class="topbar">
        <span class="idx">${String(i+1).padStart(2,'0')} / ${String(list.length).padStart(2,'0')}</span>
        <span class="ptag"><span class="dot" style="background:${p.color}"></span>${p.label}</span>
      </div>
      <div class="meta">
        <div class="name">${a.name}</div>
        <div class="role">${a.role}</div>
        <div class="statline">
          ${cardStatusHTML(a.status)}
          ${a.report?`<button class="rpt-pill" onclick="event.stopPropagation();openReport('${a.id}')">รายงาน →</button>`:""}
        </div>
      </div>`;
    grid.appendChild(card);
  });
  updateStats();
}
// full-bleed art for the gallery card (placeholder = pipeline-tinted tile with initial)
function artHTML(a){
  const grad=`linear-gradient(150deg,${PIPELINES[a.pipeline].color},#1b2330)`;
  if(!a.img) return `<div class="ph-art" style="background:${grad}">${a.name[0]}</div>`;
  return `<img class="art" src="${a.img}" alt="${a.name}"
    onerror="this.outerHTML='<div class=\\'ph-art\\' style=\\'background:${grad}\\'>${a.name[0]}</div>'">`;
}
// status line shown over the dark foot of the card (lighter tones for contrast on art)
function cardStatusHTML(s){
  const m={working:["ทำงานอยู่","#8FB0C8",true],done:["เสร็จแล้ว","#9CBBA6",false],idle:["ว่าง","rgba(255,255,255,.55)",false]};
  const [label,col,pulse]=m[s]||m.idle;
  return `<span class="cstat"><span class="cdot${pulse?' pulsing':''}" style="background:${col}"></span>${label}</span>`;
}
// rounded-square avatar for the drawer header
function avatarHTML(a){
  const initial=a.name[0];
  const grad=`linear-gradient(140deg,${PIPELINES[a.pipeline].color},#1b2330)`;
  if(!a.img) return `<div class="avatar ph" style="background:${grad}">${initial}</div>`;
  return `<img class="avatar" src="${a.img}" alt="${a.name}"
    onerror="this.outerHTML='<div class=\\'avatar ph\\' style=\\'background:${grad}\\'>${initial}</div>'">`;
}
function badgeHTML(s){
  if(s==="working")return `<span class="badge working"><span class="pulse"></span>กำลังทำ</span>`;
  if(s==="done")return `<span class="badge done">เสร็จ</span>`;
  return `<span class="badge idle">ว่าง</span>`;
}
function updateStats(){
  document.getElementById('nWorking').textContent=AGENTS.filter(a=>a.status==="working").length;
  document.getElementById('nIdle').textContent=AGENTS.filter(a=>a.status==="idle").length;
  document.getElementById('nDone').textContent=AGENTS.filter(a=>a.status==="done").length;
}

/* ---------- drawer ---------- */
const drawer=document.getElementById('drawer'),scrim=document.getElementById('scrim');
function openReport(id){ openDrawer(AGENTS.find(x=>x.id===id), true); }
function openDrawer(a, scrollToReport){
  const p=PIPELINES[a.pipeline];
  drawer.innerHTML=`
    <div class="drawer-head">
      ${avatarHTML(a)}
      <div><div class="name">${a.name}</div><div class="role">${p.label} · ${a.role}</div></div>
      <button class="close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="sec"><h4>สถานะ</h4>${badgeHTML(a.status)}${a.task?`<p style="margin-top:10px">${a.task}</p>`:`<p style="margin-top:10px" class="empty">ยังไม่มีงานที่กำลังทำ</p>`}</div>
      <div class="sec"><h4>บุคลิก</h4><p>${a.persona}</p></div>
      <div class="sec what"><h4>หน้าที่</h4><ul>${a.what.map(w=>`<li>${w}</li>`).join("")}</ul></div>
      <div class="sec"><h4>ความสามารถ</h4><div class="caps">${a.caps.map(c=>`<span class="cap">${c}</span>`).join("")}</div></div>
      <div class="sec" id="reportSec"><h4>รายงานล่าสุด</h4>${reportHTML(a.report)}</div>
    </div>`;
  drawer.classList.add('open');scrim.classList.add('open');drawer.setAttribute('aria-hidden','false');
  if(scrollToReport && a.report){
    const sec=drawer.querySelector('#reportSec');
    sec.scrollIntoView({behavior:'smooth',block:'center'});
    const r=sec.querySelector('.report'); if(r){r.classList.remove('flash');void r.offsetWidth;r.classList.add('flash');}
  }
}
function reportHTML(r){
  if(!r)return `<p class="empty">ยังไม่มีรายงาน — รอ agent ทำงานเสร็จ</p>`;
  return `<div class="report"><div class="meta"><h5>${r.title}</h5></div>
    <div class="when">${r.when}</div>
    <div class="lines" style="margin-top:10px">${r.body}</div></div>`;
}
function closeDrawer(){drawer.classList.remove('open');scrim.classList.remove('open');drawer.setAttribute('aria-hidden','true')}
scrim.onclick=closeDrawer;
document.addEventListener('keydown',e=>{if(e.key==="Escape")closeDrawer()});

/* ---------- firebase realtime listener ---------- */
render(); // seed data while Firebase connects
</script>
